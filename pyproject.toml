[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "geocrime-stl"
version = "0.0.1"
description = "A utility for cleaning St. Louis crime data sets."
readme = "README.md"
requires-python = ">=3.8"
dependencies = [
    "pandas>=2.0.0",
    "geopandas>=0.14.0",
    "requests>=2.31.0",
    "shapely>=2.0.0",
    "pyogrio>=0.7.0"
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
geocrime_stl = ["data/stl_boundary.geojson"]